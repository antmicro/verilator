image: $CI_REGISTRY_IMAGE:verilator-buildenv

build:
  <<: *common_only
  stage: build
  tags: ['default']
  variables:
    GIT_DEPTH: "1"
#  dependencies:
#    - docker-image
  script:
    - autoconf
    - ./configure --enable-longtests --enable-ccwarn
    - make -j $SCALENODE_CPU
    - rm -rfv src/obj_opt
  artifacts:
    untracked: true
    expire_in: 2 hrs
    paths:
      - .git/
      - bin/
      - docs/
      - examples/
      - include/
      - nodist/
      - src/
      - test_regress/

test:
  <<: *common_only
  stage: test
  tags: ['default']
  variables:
    GIT_STRATEGY: none
  dependencies:
    - build
  script:
    - git config --global --add safe.directory /builds/git/sifive-verilator-for-asic-verilator
    - git config --global --add safe.directory /builds/git/verilator-infrastructure-verilator
    - make -C test_regress SCENARIOS="--vlt --vltmt" DRIVER_HASHSET=--hashset=$((CI_NODE_INDEX - 1))/$CI_NODE_TOTAL
    - ./test_regress/t/t_dist_whitespace.py
  parallel: 6
